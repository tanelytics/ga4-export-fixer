<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="ga4-export-fixer">
  <rect width="1200" height="300" fill="#0E1117"/>

  <!-- Wordmark on the left, vertically centered -->
  <text x="40" y="150"
        font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, 'Liberation Mono', monospace"
        font-size="56"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="-1.5"
        dominant-baseline="central">🛠️ ga4-export-fixer</text>

  <!-- Messy raw-data shape clusters -->
  <g transform="translate(680, 58)">
    <!-- Cluster 1 -->
    <g>
      <rect x="5" y="6" width="12" height="10" fill="#4A5568"/>
      <polygon points="28,22 42,6 48,22" fill="#718096"/>
      <circle cx="62" cy="12" r="5" fill="#2D3748"/>
      <rect x="78" y="16" width="14" height="8" fill="#4A5568"/>
      <polygon points="104,8 118,16 110,24" fill="#718096"/>
      <rect x="128" y="12" width="9" height="9" fill="#2D3748"/>
      <circle cx="15" cy="40" r="4" fill="#718096"/>
      <polygon points="32,46 44,34 50,46" fill="#4A5568"/>
      <rect x="62" y="40" width="14" height="7" fill="#2D3748"/>
      <circle cx="90" cy="42" r="3" fill="#4A5568"/>
      <rect x="104" y="38" width="10" height="8" fill="#718096"/>
      <circle cx="128" cy="42" r="4" fill="#2D3748"/>
    </g>
    <!-- Cluster 2 -->
    <g transform="translate(0, 64)">
      <circle cx="10" cy="12" r="4" fill="#4A5568"/>
      <rect x="22" y="6" width="12" height="10" fill="#2D3748"/>
      <polygon points="46,20 58,4 64,22" fill="#718096"/>
      <rect x="74" y="10" width="10" height="8" fill="#4A5568"/>
      <circle cx="98" cy="16" r="5" fill="#718096"/>
      <polygon points="114,8 126,18 116,24" fill="#2D3748"/>
      <rect x="5" y="38" width="9" height="9" fill="#718096"/>
      <circle cx="30" cy="42" r="4" fill="#4A5568"/>
      <polygon points="46,46 56,34 62,46" fill="#2D3748"/>
      <rect x="72" y="40" width="14" height="7" fill="#4A5568"/>
      <circle cx="100" cy="42" r="3" fill="#718096"/>
      <rect x="114" y="40" width="12" height="7" fill="#2D3748"/>
    </g>
    <!-- Cluster 3 -->
    <g transform="translate(0, 128)">
      <polygon points="8,20 22,4 26,22" fill="#4A5568"/>
      <rect x="36" y="10" width="10" height="9" fill="#718096"/>
      <circle cx="58" cy="14" r="5" fill="#2D3748"/>
      <rect x="74" y="8" width="12" height="8" fill="#4A5568"/>
      <polygon points="100,22 112,6 120,20" fill="#718096"/>
      <circle cx="132" cy="12" r="3" fill="#4A5568"/>
      <circle cx="12" cy="42" r="3" fill="#2D3748"/>
      <rect x="24" y="38" width="14" height="7" fill="#4A5568"/>
      <polygon points="50,46 60,34 66,48" fill="#718096"/>
      <circle cx="80" cy="42" r="4" fill="#4A5568"/>
      <rect x="96" y="38" width="10" height="8" fill="#2D3748"/>
      <polygon points="118,46 128,36 132,46" fill="#718096"/>
    </g>
  </g>

  <!-- Convergent flow: clusters → wrench hub -->
  <g fill="none" stroke-width="2.5" stroke-linecap="round">
    <path d="M 825 86 C 848 86, 848 150, 870 150" stroke="#4285F4" opacity="0.85"/>
    <path d="M 825 150 L 870 150" stroke="#F9AB00" opacity="0.85"/>
    <path d="M 825 214 C 848 214, 848 150, 870 150" stroke="#4285F4" opacity="0.85"/>
  </g>

  <!-- Wrench hub (the "fixer") -->
  <circle cx="900" cy="150" r="30" fill="#1A1F2A" stroke="#F9AB00" stroke-width="2.5"/>
  <text x="900" y="150"
        font-size="36"
        text-anchor="middle"
        dominant-baseline="central">🛠️</text>

  <!-- Divergent flow: wrench hub → tables -->
  <g fill="none" stroke-width="2.5" stroke-linecap="round">
    <path d="M 930 150 C 955 150, 955 86, 980 86" stroke="#F9AB00" opacity="0.85"/>
    <path d="M 930 150 L 980 150" stroke="#4285F4" opacity="0.85"/>
    <path d="M 930 150 C 955 150, 955 214, 980 214" stroke="#F9AB00" opacity="0.85"/>
  </g>

  <!-- Clean tables -->
  <g transform="translate(980, 58)">
    <!-- Table 1 -->
    <rect x="0" y="0" width="180" height="56" rx="6" fill="#1A1F2A"/>
    <rect x="6" y="8" width="52" height="10" rx="2" fill="#F9AB00"/>
    <rect x="62" y="8" width="54" height="10" rx="2" fill="#4285F4"/>
    <rect x="120" y="8" width="54" height="10" rx="2" fill="#4285F4"/>
    <rect x="6" y="22" width="52" height="7" rx="2" fill="#2D3748"/>
    <rect x="62" y="22" width="54" height="7" rx="2" fill="#2D3748"/>
    <rect x="120" y="22" width="54" height="7" rx="2" fill="#2D3748"/>
    <rect x="6" y="33" width="52" height="7" rx="2" fill="#2D3748"/>
    <rect x="62" y="33" width="54" height="7" rx="2" fill="#2D3748"/>
    <rect x="120" y="33" width="54" height="7" rx="2" fill="#2D3748"/>
    <rect x="6" y="44" width="52" height="7" rx="2" fill="#2D3748"/>
    <rect x="62" y="44" width="54" height="7" rx="2" fill="#2D3748"/>
    <rect x="120" y="44" width="54" height="7" rx="2" fill="#2D3748"/>

    <!-- Table 2 -->
    <g transform="translate(0, 64)">
      <rect x="0" y="0" width="180" height="56" rx="6" fill="#1A1F2A"/>
      <rect x="6" y="8" width="52" height="10" rx="2" fill="#4285F4"/>
      <rect x="62" y="8" width="54" height="10" rx="2" fill="#4285F4"/>
      <rect x="120" y="8" width="54" height="10" rx="2" fill="#F9AB00"/>
      <rect x="6" y="22" width="52" height="7" rx="2" fill="#2D3748"/>
      <rect x="62" y="22" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="120" y="22" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="6" y="33" width="52" height="7" rx="2" fill="#2D3748"/>
      <rect x="62" y="33" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="120" y="33" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="6" y="44" width="52" height="7" rx="2" fill="#2D3748"/>
      <rect x="62" y="44" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="120" y="44" width="54" height="7" rx="2" fill="#2D3748"/>
    </g>

    <!-- Table 3 -->
    <g transform="translate(0, 128)">
      <rect x="0" y="0" width="180" height="56" rx="6" fill="#1A1F2A"/>
      <rect x="6" y="8" width="52" height="10" rx="2" fill="#F9AB00"/>
      <rect x="62" y="8" width="54" height="10" rx="2" fill="#4285F4"/>
      <rect x="120" y="8" width="54" height="10" rx="2" fill="#4285F4"/>
      <rect x="6" y="22" width="52" height="7" rx="2" fill="#2D3748"/>
      <rect x="62" y="22" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="120" y="22" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="6" y="33" width="52" height="7" rx="2" fill="#2D3748"/>
      <rect x="62" y="33" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="120" y="33" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="6" y="44" width="52" height="7" rx="2" fill="#2D3748"/>
      <rect x="62" y="44" width="54" height="7" rx="2" fill="#2D3748"/>
      <rect x="120" y="44" width="54" height="7" rx="2" fill="#2D3748"/>
    </g>
  </g>
</svg>
